function getColor(business) {
  if (business === '住宅') return '#e74c3c';
  if (['学校','医院'].includes(business)) return '#3498db';
  if (['厂房','写字楼','公寓写字楼'].includes(business)) return '#f39c12';
  if (['文旅','宿舍楼'].includes(business)) return '#27ae60';

}

      <tr><td class="label">建设单位</td><td class="val">${p.owner}</td></tr>
      <tr><td class="label">业态</td><td class="val">${p.business}</td></tr>
      <tr><td class="label">阶段</td><td class="val">${p.stage}</td></tr>
    </table>
  </div>`;
}

function addMarkers(filtered) {
  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];
  
  let totalAmount = 0, totalArea = 0;
  
  filtered.forEach(p => {
    if (!p.lat || !p.lon) return;
    if (typeof p.amount === 'number') totalAmount += p.amount;
    if (typeof p.area === 'number') totalArea += p.area;
    
    const color = getColor(p.business);
    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 10, fillColor: color, color: 'white',
      weight: 2.5, opacity: 1, fillOpacity: 0.85
    }).addTo(map);
    
    marker.bindPopup(createPopupContent(p), {maxWidth: 280});
    currentMarkers.push(marker);
  });
  
  document.getElementById('totalAmount').textContent = totalAmount.toFixed(1);
  document.getElementById('totalArea').textContent = totalArea.toFixed(1);
}

function applyFilters() {
  const city = document.getElementById('cityFilter').value;
  const biz = document.getElementById('bizFilter').value;
  const stage = document.getElementById('stageFilter').value;
  
  const filtered = projects.filter(p => {
    if (!p.lat) return false;
    if (city !== 'all' && p.city !== city) return false;
    if (biz !== 'all' && p.business !== biz) return false;
    if (stage !== 'all' && p.stage !== stage) return false;
    return true;
  });
  
  document.getElementById('filteredCount').textContent = filtered.length;
  addMarkers(filtered);
  
  // 调整视图到可见范围
  if (filtered.length > 0) {
    const validProjects = filtered.filter(p => p.lat && p.lon);
    if (validProjects.length > 0) {
      const lats = validProjects.map(p => p.lat);
      const lons = validProjects.map(p => p.lon);
      const bounds = L.latLngBounds(lats.map((lat, i) => [lat, lons[i]]));
      map.fitBounds(bounds.pad(0.2));
    }
  }
}

// 初始化下拉选项
function initFilters() {
  const cities = [...new Set(projects.map(p => p.city))].filter(Boolean).sort();
  const bizs = [...new Set(projects.map(p => p.business))].filter(Boolean).sort();
  const stages = [...new Set(projects.map(p => p.stage))].filter(Boolean).sort();
  
  cities.forEach(c => {
    const opt = document.createElement('option'); opt.value = c; opt.textContent = c;
    document.getElementById('cityFilter').appendChild(opt);
  });
  bizs.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b === '/' ? '未分类' : b;
    document.getElementById('bizFilter').appendChild(opt);
  });
  stages.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s === '/' ? '未分类' : s;
    document.getElementById('stageFilter').appendChild(opt);
  });
}

initFilters();
applyFilters();
</script>
</body>
</html>
