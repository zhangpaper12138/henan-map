  .popup-table td:first-child{color:#888;width:72px;white-space:nowrap;}
  .popup-footer{padding:6px 10px;background:#f9f9f9;font-size:11px;color:#999;text-align:center;}
  #progress-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:#e0e0e0;z-index:9999;display:none;}
  #progress-bar.show{display:block;}
  #progress-bar .bar{height:100%;background:#1a73e8;transition:width .3s;}
</style>
</head>

  {id:19,city:"郑州市",name:"中国烟草总公司郑州烟草研究院科研基础设施升级改造项目",address:"郑州高新开发区枫杨街2号",builder:"中国烟草总公司郑州烟草研究院",area:"—",amount:"—",pm:"黄晓兵",stage:"—",status:"在建"},
  {id:20,city:"郑州市",name:"智学产业园施工",address:"郑州市郑东新区金水东路南，后贾西街东",builder:"河南智学教育科技有限公司",area:"—",amount:"—",pm:"李伟斌",stage:"—",status:"停缓建"},
  {id:21,city:"许昌市",name:"中原电气谷智能电气城项目（一期）工程总承包（EPC）三标段",address:"许昌市建安区北外环与魏武路交叉口",builder:"中原电气谷科技发展有限公司",area:"—",amount:"—",pm:"杨涛",stage:"地基基础",status:"在建"},
  {id:22,city:"郑州市",name:"智能感知与数字装备产业基地项目",address:"郑州高新区青梅街南、金柏路西",builder:"郑州智能传感谷有限公司",area:"—",amount:"—",pm:"—",stage:"地基基础",status:"在建"},
  {id:23,city:"洛阳市",name:"洛阳高新区棚户区改造孙旗屯三期项目",address:"洛阳市高新区孙旗屯",builder:"洛阳信德置业有限公司",area:"—",amount:"—",pm:"常尊鹏",stage:"主体施工阶段",status:"在建"},
  {id:24,city:"洛阳市",name:"河南科技大学菁院15号16号宿舍楼项目",address:"洛阳市开元大道263号河南科技大学主校区",builder:"河南科技大学",area:"—",amount:"—",pm:"—",stage:"地基基础",status:"在建"},
  {id:25,city:"安阳市",name:"G341胶海线林州市区至桃园段新建工程施工第一标段",address:"安阳市林州市起点于龙山街道西街村G341与学院路交叉处",builder:"林州市公路事业发展中心",area:"—",amount:"—",pm:"范俊强",stage:"—",status:"在建"},
  {id:26,city:"郑州市",name:"郑州海昌海洋公园项目（二期）",address:"郑州市中牟县大孟镇平安大道东1号",builder:"郑州海昌海洋公园旅游发展有限公司",area:"—",amount:"—",pm:"—",stage:"主体施工阶段",status:"在建"},
  {id:27,city:"洛阳市",name:"洛宁科创产业园建设项目（EPC）",address:"洛阳市洛宁县",builder:"洛宁融宁产业发展有限公司",area:"—",amount:"—",pm:"—",stage:"主体结构",status:"在建"},
  {id:28,city:"鹤壁市",name:"鹤壁工程技术学院（二期）",address:"鹤壁市淇滨区朝歌路5号",builder:"河南信息科技学院筹建处",area:"—",amount:"—",pm:"—",stage:"主体结构",status:"在建"},
];

const cityStats = {};
projects.forEach(p => { cityStats[p.city] = (cityStats[p.city]||0)+1; });
const cityView = {"郑州市":[113.625,34.746,10],"济源市":[112.590,35.067,10],"平顶山市":[113.192,33.766,10],"新乡市":[113.926,35.303,10],"许昌市":[113.822,34.036,10],"洛阳市":[112.454,34.620,10],"安阳市":[114.393,36.097,10],"商丘市":[115.656,34.438,10],"鹤壁市":[114.295,35.748,10]};

let map, geocoder, markers=[], infoWindow;
const coords = {};

window.onload = function() {
  document.getElementById('loading').classList.add('show');
  document.getElementById('lt2').textContent = '正在加载高德地图...';
  map = new AMap.Map('map',{zoom:7,center:[113.0,34.5],viewMode:'2D',mapStyle:'amap://styles/whitesmoke'});
  AMap.plugin('AMap.ToolBar',()=>map.addControl(new AMap.ToolBar({position:'RB'})));
  infoWindow = new AMap.InfoWindow({offset:new AMap.Pixel(0,-20),content:''});
  geocoder = new AMap.Geocoder({radius:1000,extensions:'all'});
  map.on('complete',()=>{
    document.getElementById('loading').classList.remove('show');
    buildCityStats();
    document.getElementById('info-panel').style.display='block';
    startGeocode();
  });
};

function buildPopup(p) {
  const statusColor = p.status==='停缓建'?'#ea4335':'#1a73e8';
  const fmt = v => v&&v!=='—'?v:'—';
  return `<div class="popup-wrap">
    <div class="popup-title">${p.name}</div>
    <table class="popup-table">
      <tr><th>建设单位</th><td>${fmt(p.builder)}</td></tr>
      <tr><th>建筑面积</th><td>${fmt(p.area)}${p.area&&p.area!='—'?' 万㎡':''}</td></tr>
      <tr><th>合同额</th><td>${fmt(p.amount)}${p.amount&&p.amount!='—'?' 亿元':''}</td></tr>
      <tr><th>形象阶段</th><td style="color:${statusColor};font-weight:600;">${fmt(p.stage)}</td></tr>
      <tr><th>项目经理</th><td>${fmt(p.pm)}</td></tr>
      <tr><th>详细地址</th><td style="font-size:12px;color:#666;">${fmt(p.address)}</td></tr>
    </table>
    <div class="popup-footer">状态: <span style="color:${statusColor};font-weight:600;">● ${p.status}</span> · ${p.city}</div>
  </div>`;
}

function startGeocode() {
  const pending = projects.filter(p=>!coords[p.id]);
  const total = pending.length;
  let done = 0;
  const pbar = document.getElementById('progress-bar');
  const pbarEl = document.getElementById('progress');
  pbar.classList.add('show');
  pending.forEach(p=>{
    const addr = `河南省${p.city}${p.address||''}`;
    geocoder.getLocation(addr,(status,result)=>{
      done++;
      const pct = Math.round(done/total*100);
      pbarEl.style.width = pct+'%';
      document.getElementById('lt2').textContent = `正在解析坐标 ${done}/${total}...`;
      if(status==='complete'&&result.geocodes.length>0){
        const loc = result.geocodes[0].location;
        coords[p.id] = {lng:loc.lng,lat:loc.lat};
      }
      if(done===total){
        pbar.classList.remove('show');
        renderMarkers();
      }
    });
  });
  if(total===0) renderMarkers();
}

function renderMarkers() {
  markers.forEach(m=>m.setMap(null));
  markers=[];
  projects.forEach(p=>{
    let c = coords[p.id];
    if(!c) return;
    const color = p.status==='停缓建'?'#ea4335':'#1a73e8';
    const m = new AMap.Marker({position:[c.lng,c.lat],title:p.name,
      content:`<div style="width:12px;height:12px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.3);cursor:pointer;"></div>`,
      offset:new AMap.Pixel(-6,-6)});
    m.on('click',()=>{
      infoWindow.setContent(buildPopup(p));
      infoWindow.open(map,[c.lng,c.lat]);
    });
    m.setMap(map);
    markers.push(m);
  });
}

function buildCityStats() {
  const el=document.getElementById('cs');
  let html='';
  Object.entries(cityStats).sort((a,b)=>b[1]-a[1]).forEach(([city,count])=>{
    html+=`<div class="csi" onclick="focusCity('${city}')"><span>${city}</span><span class="cnt">${count}</span></div>`;
  });
  el.innerHTML=html;
}

function focusCity(city){
  const v=cityView[city];if(!v)return;
  map.setZoomAndCenter(v[2],new AMap.LngLat(v[0],v[1]));
  const list=projects.filter(p=>p.city===city);
  showList(city+` (${list.length}个项目)`,list);
}

function showList(title,list){
  document.getElementById('lt').textContent=title;
  document.getElementById('lc').textContent=list.length+'个项目';
  document.getElementById('pis').innerHTML=list.map(p=>{
    const color=p.status==='停缓建'?'#ea4335':'#1a73e8';
    return`<div class="pi" onclick="flyTo(${p.id})"><div class="dot" style="background:${color};"></div><div class="info"><div class="name">${p.name}</div><div class="meta">${p.city} · ${p.status}</div></div></div>`;
  }).join('');
  document.getElementById('proj-list').classList.add('show');
}

function flyTo(id){
  const p=projects.find(pr=>pr.id===id);if(!p||!coords[p.id])return;
  const c=coords[p.id];
  map.setZoomAndCenter(14,new AMap.LngLat(c.lng,c.lat));
  infoWindow.setContent(buildPopup(p));
  infoWindow.open(map,[c.lng,c.lat]);
  document.getElementById('proj-list').classList.remove('show');
}

document.getElementById('si').addEventListener('input',function(e){
  const q=e.target.value.trim(),sr=document.getElementById('sr');
  if(q.length<1){sr.style.display='none';return;}
  const m=projects.filter(p=>p.name.includes(q)||p.city.includes(q));
  sr.innerHTML=m.length===0?'<div style="color:#999;font-size:12px;padding:6px 8px;">未找到</div>':
    m.map(p=>`<div class="sri" onclick="flyTo(${p.id});sr.style.display='none';si.value='';"><span class="city-tag">${p.city}</span>${p.name}</div>`).join('');
  sr.style.display='block';
});
document.getElementById('si').addEventListener('blur',()=>setTimeout(()=>sr.style.display='none',200));
</script>
</body>
</html>
