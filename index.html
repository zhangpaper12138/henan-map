.wrap{display:flex;height:100vh;}

/* 左侧面板 */
.sidebar{

.stat-row{

.stat-box{

.filters-box{padding:10px 14px;border-bottom:1px solid #eee;flex-shrink:0;}
.filters-box label{display:block;font-size:10px;font-weight:700;color:#999;margin-bottom:4px;letter-spacing:0.5px;}

}

.proj-list{flex:1;overflow-y:auto;padding:8px 12px;}

let map, markers = [];
let activeMarker = null;
let infoWin = null;

function getColor(b) {
  if (b === '住宅') return '#e74c3c';
  if (['学校','医院'].includes(b)) return '#3498db';
  if (['厂房','写字楼','公寓写字楼'].includes(b)) return '#f39c12';
  if (['文旅','宿舍楼'].includes(b)) return '#27ae60';
  return '#9b59b6';
}

function fA(v) { return typeof v === 'number' ? v.toFixed(1) : (v === 'N/A' ? '-' : v); }
function fA2(v) { return typeof v === 'number' ? v.toFixed(2) : (v === 'N/A' ? '-' : v); }

function fmtAddr(a) { return a.length > 25 ? a.slice(0,25) + '...' : a; }

function createInfoWin(p) {
  return `<div style="padding:2px 0;">
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;">
      <span style="color:#aaa;font-size:11px;">合同额</span>
      <span style="font-size:15px;font-weight:700;color:#1a237e;">${fA(p.amount)} 亿元</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;">
      <span style="color:#aaa;font-size:11px;">建筑面积</span>
      <span style="font-size:13px;font-weight:600;">${fA2(p.area)} 万㎡</span>
    </div>
    <div style="padding:6px 0;border-bottom:1px solid #f0f0f0;">
      <div style="color:#aaa;font-size:11px;">建设单位</div>
      <div style="font-size:12px;font-weight:600;margin-top:2px;">${p.owner}</div>
    </div>
    <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0;">
      <div><div style="color:#aaa;font-size:10px;">业态</div><div style="font-size:12px;font-weight:600;">${p.business}</div></div>
      <div><div style="color:#aaa;font-size:10px;">阶段</div><div style="font-size:12px;font-weight:600;">${p.stage}</div></div>
    </div>
    <div style="padding:6px 0;">
      <div style="color:#aaa;font-size:10px;">详细地址</div>
      <div style="font-size:11px;color:#666;margin-top:2px;line-height:1.4;">${p.addr}</div>
    </div>
  </div>`;
}

function showProject(seq) {
  const p = projects.find(x => x.seq === seq);
  if (!p) return;
  
  // 高亮列表
  document.querySelectorAll('.proj-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.seq) === seq);
    if (parseInt(el.dataset.seq) === seq) el.scrollIntoView({block:'nearest'});
  });
  
  // 弹窗
  document.getElementById('winName').textContent = p.name;
  document.getElementById('winCity').textContent = '📍 ' + p.city;
  document.getElementById('winBody').innerHTML = createInfoWin(p);
  document.getElementById('infoWin').classList.add('show');
  
  // 地图移动到标记
  if (map && p.lat && p.lon) {
    map.setZoomAndCenter(12, [p.lon, p.lat]);
  }
  
  // 高亮标记
  markers.forEach(m => {
    if (parseInt(m.getExtData().seq) === seq) {
      if (activeMarker) activeMarker.setRadius(8);
      m.setRadius(12);
      activeMarker = m;
    }
  });
}

function closeWin() {
  document.getElementById('infoWin').classList.remove('show');
  if (activeMarker) { activeMarker.setRadius(8); activeMarker = null; }
}

function doFilter() {
  const city = document.getElementById('citySel').value;
  const biz = document.getElementById('bizSel').value;
  const stage = document.getElementById('stageSel').value;
  
  let filtered = projects.filter(p => {
    if (!p.lat) return false;
    if (city !== 'all' && p.city !== city) return false;
    if (biz !== 'all' && p.business !== biz) return false;
    if (stage !== 'all' && p.stage !== stage) return false;
    return true;
  });
  
  document.getElementById('statCount').textContent = filtered.length;
  let tA = 0, tB = 0;
  filtered.forEach(p => {
    if (typeof p.amount === 'number') tA += p.amount;
    if (typeof p.area === 'number') tB += p.area;
  });
  document.getElementById('statAmount').textContent = tA.toFixed(1);
  document.getElementById('statArea').textContent = tB.toFixed(1);
  
  renderMarkers(filtered);
  renderList(filtered);
  closeWin();
}

function renderMarkers(ps) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  
  ps.forEach((p, idx) => {
    if (!p.lat || !p.lon) return;
    const color = getColor(p.business);
    
    // 使用CircleMarker（支持自定义颜色和大小）
    const marker = new AMap.CircleMarker({
      map: map,
      center: [p.lon, p.lat],
      radius: 8,
      fillColor: color,
      strokeColor: 'white',
      strokeWeight: 2,
      extData: { seq: p.seq }
    });
    
    marker.on('click', () => showProject(p.seq));
    markers.push(marker);
  });
}

function renderList(ps) {
  document.getElementById('projListContent').innerHTML = ps.map(p => `
    <div class="proj-item" data-seq="${p.seq}" onclick="showProject(${p.seq})">
      <div class="name">${fmtAddr(p.name)}</div>
      <div class="meta">
        <span>📍 ${p.city}</span>
        <span>💰 ${fA(p.amount)}亿</span>
        <span>🏗️ ${p.business}</span>
      </div>
    </div>
  `).join('');
}

// 初始化筛选下拉
function initFilters() {
  const cs = [...new Set(projects.map(p => p.city))].filter(Boolean).sort();
  const bs = [...new Set(projects.map(p => p.business))].filter(Boolean).sort();
  const ss = [...new Set(projects.map(p => p.stage))].filter(Boolean).sort();
  cs.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    document.getElementById('citySel').appendChild(o);
  });
  bs.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b === '/' ? '未分类' : b;
    document.getElementById('bizSel').appendChild(o);
  });
  ss.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s === '/' ? '未分类' : s;
    document.getElementById('stageSel').appendChild(o);
  });
}

// 初始化地图
function initMap() {
  map = new AMap.Map('amap', {
    zoom: 7,
    center: [113.5, 34.2],
    mapStyle: 'amap://styles/normal',
    viewMode: '2D',
    showIndoorMap: false,
    zoomSensitivity: 1,
    touchZoom: true,
  });
  
  map.on('complete', () => {
    document.getElementById('mapLoading').style.display = 'none';
    
    // 隐藏高德Logo和版权（不推荐，仅为演示）
    document.querySelectorAll('.amap-logo, .amap-copyright').forEach(el => el.style.display = 'none');
    
    initFilters();
    renderMarkers(projects);
    renderList(projects);
    
    // 初始统计
    let tA = 0, tB = 0;
    projects.forEach(p => {
      if (typeof p.amount === 'number') tA += p.amount;
      if (typeof p.area === 'number') tB += p.area;
    });
    document.getElementById('statAmount').textContent = tA.toFixed(1);
    document.getElementById('statArea').textContent = tB.toFixed(1);
  });
  
  // 点击地图关闭弹窗
  map.on('click', () => closeWin());
}

// 弹窗跟随marker
document.addEventListener('mousemove', (e) => {
  const win = document.getElementById('infoWin');
  if (!win.classList.contains('show')) return;
  const rect = document.getElementById('amap').getBoundingClientRect();
  let x = e.clientX - rect.left + 15;
  let y = e.clientY - rect.top + 15;
  if (x + 310 > rect.width) x = e.clientX - rect.left - 315;
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.right = 'auto';
});

initMap();
</script>
