// ========== 地图绘制 ==========
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

const mapState = {
  centerLat: 34.65, centerLon: 113.55, zoom: 7,
  minLat: 33.3, maxLat: 36.2, minLon: 110.3, maxLon: 116.2
};

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  render();
}

function latLonToXY(lat, lon) {
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const x = ((lon - mapState.minLon) / (mapState.maxLon - mapState.minLon)) * w;
  const y = ((mapState.maxLat - lat) / (mapState.maxLat - mapState.minLat)) * h;
  return [x, y];
}

function xyToLatLon(x, y) {
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const lon = (x / w) * (mapState.maxLon - mapState.minLon) + mapState.minLon;
  const lat = mapState.maxLat - (y / h) * (mapState.maxLat - mapState.minLat);
  return [lat, lon];
}

function getColor(business) {
  if (business === '住宅') return '#e74c3c';
  if (['学校','医院'].includes(business)) return '#3498db';
  if (['厂房','写字楼','公寓写字楼'].includes(business)) return '#f39c12';
  if (['文旅','宿舍楼'].includes(business)) return '#27ae60';
  return '#9b59b6';
}

function formatAmount(v) { return (typeof v === 'number' ? v.toFixed(1) : (v === 'N/A' ? '-' : v)); }
function formatArea(v) { return (typeof v === 'number' ? v.toFixed(2) : (v === 'N/A' ? '-' : v)); }

let markerElements = [];
let selectedProject = null;

function render() {
  const w = canvas.width / dpr, h = canvas.height / dpr;
  ctx.clearRect(0, 0, w, h);
  
  // 背景
  ctx.fillStyle = '#e8f4f8';
  ctx.fillRect(0, 0, w, h);
  
  // 绘制简单网格背景
  ctx.strokeStyle = '#d0e8f0';
  ctx.lineWidth = 0.5;
  const gridCount = 8;
  for (let i = 0; i <= gridCount; i++) {
    const x = (w / gridCount) * i;
    const y = (h / gridCount) * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  
  // 城市标签
  const cityLabels = [
    {name:'郑州', lat:34.75, lon:113.62}, {name:'洛阳', lat:34.62, lon:112.45},
    {name:'新乡', lat:35.30, lon:113.92}, {name:'开封', lat:34.80, lon:114.35},
    {name:'安阳', lat:36.06, lon:114.40}, {name:'焦作', lat:35.22, lon:113.25},
    {name:'许昌', lat:34.03, lon:113.85}, {name:'平顶山', lat:33.77, lon:113.18},
    {name:'济源', lat:35.08, lon:112.60}, {name:'商丘', lat:34.42, lon:115.66},
    {name:'鹤壁', lat:35.75, lon:114.30}
  ];
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillStyle = '#aaa';
  cityLabels.forEach(c => {
    const [x, y] = latLonToXY(c.lat, c.lon);
    if (x > 30 && x < w - 30 && y > 30 && y < h - 30) {
      ctx.fillText(c.name, x, y);
    }
  });
  
  // 绘制河南省轮廓（简化多边形）
  ctx.strokeStyle = '#90caf9';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(144,202,249,0.08)';
  ctx.beginPath();
  const henanBorder = [
    [34.38,110.30],[34.48,110.85],[34.85,111.80],[34.95,112.45],
    [34.60,112.50],[34.28,113.35],[34.15,113.85],[34.38,114.45],
    [34.78,115.05],[35.10,115.55],[35.48,116.05],[35.70,116.18],
    [36.05,116.15],[36.20,115.75],[35.95,115.05],[35.58,114.35],
    [35.75,113.55],[35.38,112.95],[35.22,112.15],[35.05,111.55],
    [34.85,110.90],[34.45,110.30]
  ];
  henanBorder.forEach((pt, i) => {
    const [x, y] = latLonToXY(pt[0], pt[1]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // 绘制标记
  markerElements = [];
  visibleProjects.forEach((p, idx) => {
    if (!p.lat || !p.lon) return;
    const [x, y] = latLonToXY(p.lat, p.lon);
    const color = getColor(p.business);
    const isSelected = selectedProject && selectedProject.seq === p.seq;
    const r = isSelected ? 10 : 8;
    
    // 阴影
    ctx.beginPath();
    ctx.arc(x+1, y+2, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();
    
    // 圆点
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#ffd54f' : 'white';
    ctx.lineWidth = isSelected ? 3 : 2;
    ctx.stroke();
    
    // 序号
    ctx.fillStyle = 'white';
    ctx.font = `bold ${r - 2}px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(idx + 1), x, y);
    ctx.textBaseline = 'alphabetic';
    
    // 保存元素信息用于点击检测
    markerElements.push({x, y, r: r + 3, project: p, idx});
  });
}

function showInfoCard(p) {
  selectedProject = p;
  render();
  document.getElementById('cardName').textContent = p.name;
  document.getElementById('cardCity').textContent = '📍 ' + p.city;
  document.getElementById('cardBody').innerHTML = `
    <div class="info-row"><span class="label">合同额</span><span class="value highlight">${formatAmount(p.amount)} 亿元</span></div>
    <div class="info-row"><span class="label">建筑面积</span><span class="value">${formatArea(p.area)} 万㎡</span></div>
    <div class="info-row"><span class="label">建设单位</span><span class="value" style="font-size:11px;">${p.owner}</span></div>
    <div class="info-row"><span class="label">业态类型</span><span class="value">${p.business}</span></div>
    <div class="info-row"><span class="label">承包方式</span><span class="value">${p.type}</span></div>
    <div class="info-row"><span class="label">当前阶段</span><span class="value">${p.stage}</span></div>
    <div class="info-row" style="flex-direction:column;align-items:flex-start;gap:3px;">
      <span class="label">详细地址</span>
      <span class="value" style="font-size:11px;color:#666;max-width:100%;">${p.addr}</span>
    </div>
  `;
  document.getElementById('infoCard').classList.add('show');
}

function closeCard() {
  document.getElementById('infoCard').classList.remove('show');
  selectedProject = null;
  render();
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return [e.clientX - rect.left, e.clientY - rect.top];
}

canvas.addEventListener('click', (e) => {
  const [mx, my] = getMousePos(e);
  for (const m of markerElements) {
    const dx = mx - m.x, dy = my - m.y;
    if (dx*dx + dy*dy <= m.r * m.r) {
      showInfoCard(m.project);
      return;
    }
  }
  closeCard();
});

canvas.addEventListener('mousemove', (e) => {
  const [mx, my] = getMousePos(e);
  let found = false;
  for (const m of markerElements) {
    const dx = mx - m.x, dy = my - m.y;
    if (dx*dx + dy*dy <= m.r * m.r) {
      canvas.style.cursor = 'pointer';
      found = true;
      break;
    }
  }
  if (!found) canvas.style.cursor = 'default';
});

// ========== 筛选 ==========
let visibleProjects = [...projects];

function applyFilters() {
  const city = document.getElementById('cityFilter').value;
  const biz = document.getElementById('bizFilter').value;
  const stage = document.getElementById('stageFilter').value;
  
  visibleProjects = projects.filter(p => {
    if (!p.lat) return false;
    if (city !== 'all' && p.city !== city) return false;
    if (biz !== 'all' && p.business !== biz) return biz === '/' && p.business === '/' ? true : p.business === biz;
    if (stage !== 'all' && p.stage !== stage) return stage === '/' && p.stage === '/' ? true : p.stage === stage;
    return true;
  });
  
  document.getElementById('filteredCount').textContent = visibleProjects.length;
  document.getElementById('emptyTip').classList.toggle('show', visibleProjects.length === 0);
  
  // 统计
  let totalAmount = 0, totalArea = 0;
  visibleProjects.forEach(p => {
    if (typeof p.amount === 'number') totalAmount += p.amount;
    if (typeof p.area === 'number') totalArea += p.area;
  });
  document.getElementById('totalAmount').textContent = totalAmount.toFixed(1);
  document.getElementById('totalArea').textContent = totalArea.toFixed(1);
  
  closeCard();
  render();
}

// 初始化下拉选项
function initFilters() {
  const cities = [...new Set(projects.map(p => p.city))].filter(Boolean).sort();
  const bizs = [...new Set(projects.map(p => p.business))].filter(Boolean).sort();
  const stages = [...new Set(projects.map(p => p.stage))].filter(Boolean).sort();
  
  cities.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    document.getElementById('cityFilter').appendChild(opt);
  });
  bizs.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b === '/' ? '未分类' : b;
    document.getElementById('bizFilter').appendChild(opt);
  });
  stages.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s === '/' ? '未分类' : s;
    document.getElementById('stageFilter').appendChild(opt);
  });
}

// 初始化
window.addEventListener('resize', resizeCanvas);
initFilters();
resizeCanvas();

// 初始统计
applyFilters();
</script>
</body>
</html>
