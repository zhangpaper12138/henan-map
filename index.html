  {"seq": 26, "name": "郑州海昌海洋公园项目（二期）", "addr": "郑州市中牟县大孟镇平安大道东1号", "lat": 34.6, "lon": 113.91, "amount": 4.5, "area": 3.14, "owner": "郑州海昌海洋公园旅游发展有限公司", "type": "施工总承包", "business": "文旅", "stage": "装饰装修", "city": "郑州市"},
  {"seq": 27, "name": "洛宁科创产业园建设项目（EPC）", "addr": "洛阳市洛宁县", "lat": 34.38, "lon": 111.85, "amount": 5.2, "area": 11.73, "owner": "洛阳鑫城实业有限公司", "type": "EPC", "business": "写字楼", "stage": "主体结构", "city": "洛阳市"},
  {"seq": 28, "name": "鹤壁工程技术学院（二期）", "addr": "鹤壁市淇滨区朝歌路5号", "lat": 35.75, "lon": 114.3, "amount": 3.83, "area": 7.3, "owner": "河南信息科技学院筹建处", "type": "EPC", "business": "学校", "stage": "主体结构", "city": "鹤壁市"}
];

let map, markers = [];
let cardMarker = null;

function getStatus(p) {
  if (p.stage && p.stage.includes('停缓建')) return 'tinghuan';
  return 'zaijian';
}
function getColor(p) { return getStatus(p) === 'tinghuan' ? '#c62828' : '#1565c0'; }
function getStatusText(p) { return getStatus(p) === 'tinghuan' ? '停缓建' : '在建'; }
function fA(v) { return typeof v === 'number' ? v.toFixed(1) : (v === 'N/A' ? '-' : v); }
function fA2(v) { return typeof v === 'number' ? v.toFixed(2) : (v === 'N/A' ? '-' : v); }

function showCard(p, pixel) {
  const card = document.getElementById('infoCard');
  const status = getStatus(p);
  const statusText = getStatusText(p);
  
  document.getElementById('cardName').textContent = p.name;
  document.getElementById('cardBody').innerHTML = `
    <div class="info-row">
      <span class="lb">城市</span>
      <span class="vl">${p.city}</span>
    </div>
    <div class="info-row">
      <span class="lb">状态</span>
      <span class="status-badge ${status}">${statusText}</span>
    </div>
    <div class="info-row">
      <span class="lb">合同额</span>
      <span class="vl big">${fA(p.amount)} 亿元</span>
    </div>
    <div class="info-row">
      <span class="lb">建筑面积</span>
      <span class="vl">${fA2(p.area)} 万㎡</span>
    </div>
    <div class="info-row" style="flex-direction:column;gap:3px;">
      <span class="lb">建设单位</span>
      <span class="vl" style="max-width:100%;font-size:11px;color:#555;">${p.owner}</span>
    </div>
    <div class="info-row">
      <span class="lb">业态类型</span>
      <span class="vl">${p.business}</span>
    </div>
    <div class="info-row">
      <span class="lb">当前阶段</span>
      <span class="vl">${p.stage}</span>
    </div>
    <div class="info-row" style="flex-direction:column;gap:3px;">
      <span class="lb">详细地址</span>
      <span class="vl addr">${p.addr}</span>
    </div>
  `;
  
  const mapEl = document.getElementById('amap');
  const rect = mapEl.getBoundingClientRect();
  let left = pixel.x + 15;
  let top = pixel.y - 100;
  if (left + 300 > rect.width) left = Math.max(10, pixel.x - 305);
  if (top < 10) top = pixel.y + 15;
  if (top + 380 > rect.height) top = rect.height - 390;
  
  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.style.right = 'auto';
  card.classList.add('show');
  
  document.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.seq) === p.seq);
  });
}

function closeCard() {
  document.getElementById('infoCard').classList.remove('show');
  if (cardMarker) { cardMarker.setRadius(9); cardMarker = null; }
}

function doFilter() {
  const city = document.getElementById('citySel').value;
  const stage = document.getElementById('stageSel').value;
  
  const filtered = projects.filter(p => {
    if (!p.lat) return false;
    if (city !== 'all' && p.city !== city) return false;
    if (stage !== 'all' && getStatus(p) !== stage) return false;
    return true;
  });
  
  document.getElementById('statCount').textContent = filtered.length;
  let tA = 0, tB = 0;
  filtered.forEach(p => {
    if (typeof p.amount === 'number') tA += p.amount;
    if (typeof p.area === 'number') tB += p.area;
  });
  document.getElementById('statAmount').textContent = tA.toFixed(1);
  document.getElementById('statArea').textContent = tB.toFixed(1);
  
  renderMarkers(filtered);
  renderList(filtered);
  closeCard();
}

function renderMarkers(ps) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  
  ps.forEach(p => {
    if (!p.lat || !p.lon) return;
    const marker = new AMap.CircleMarker({
      map: map,
      center: [p.lon, p.lat],
      radius: 9,
      fillColor: getColor(p),
      strokeColor: 'white',
      strokeWeight: 2.5,
      extData: { seq: p.seq }
    });
    marker.on('click', (e) => {
      if (cardMarker) cardMarker.setRadius(9);
      marker.setRadius(13);
      cardMarker = marker;
      const pixel = map.lngLatToContainer([p.lon, p.lat]);
      showCard(p, pixel);
    });
    markers.push(marker);
  });
}

function renderList(ps) {
  document.getElementById('listContent').innerHTML = ps.map(p => {
    const status = getStatus(p);
    const statusText = getStatusText(p);
    return `<div class="list-item" data-seq="${p.seq}" onclick="showProject(${p.seq})">
      <div class="proj-name">
        ${p.name.length > 26 ? p.name.slice(0,26) + '...' : p.name}
        <span class="status-badge ${status}">${statusText}</span>
      </div>
      <div class="proj-meta">
        <span>📍 ${p.city}</span>
        <span>💰 ${fA(p.amount)}亿</span>
        <span>🏗️ ${p.business}</span>
      </div>
    </div>`;
  }).join('');
}

function showProject(seq) {
  const p = projects.find(x => x.seq === seq);
  if (!p || !p.lat) return;
  const m = markers.find(m => parseInt(m.getExtData().seq) === seq);
  if (m) {
    if (cardMarker) cardMarker.setRadius(9);
    m.setRadius(13);
    cardMarker = m;
    map.setCenter([p.lon, p.lat]);
    const pixel = map.lngLatToContainer([p.lon, p.lat]);
    showCard(p, pixel);
    const el = document.querySelector(`[data-seq="${seq}"]`);
    if (el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function initFilters() {
  const cs = [...new Set(projects.map(p => p.city))].filter(Boolean).sort();
  cs.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    document.getElementById('citySel').appendChild(o);
  });
}

function initMap() {
  map = new AMap.Map('amap', {
    zoom: 7, center: [113.5, 34.2],
    mapStyle: 'amap://styles/normal',
    viewMode: '2D', showIndoorMap: false,
  });
  
  map.on('complete', () => {
    document.getElementById('mapLoading').style.display = 'none';
    document.querySelectorAll('.amap-logo, .amap-copyright').forEach(el => el.style.display = 'none');
    initFilters();
    renderMarkers(projects);
    renderList(projects);
    let tA = 0, tB = 0;
    projects.forEach(p => {
      if (typeof p.amount === 'number') tA += p.amount;
      if (typeof p.area === 'number') tB += p.area;
    });
    document.getElementById('statAmount').textContent = tA.toFixed(1);
    document.getElementById('statArea').textContent = tB.toFixed(1);
  });
  
  map.on('click', () => closeCard());
}

initMap();
</script>
</body>
</html>
