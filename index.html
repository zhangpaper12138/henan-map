// ========== 地图投影（河南地理坐标范围）==========
// 河南: 经度110.3-116.6, 纬度31.4-36.4
const BOUNDS = {minLon:110.3, maxLon:116.6, minLat:31.4, maxLat:36.4};
const SVG_W = 800, SVG_H = 600, PAD = 30;

function proj(lon, lat) {
  return [
    PAD + (lon - BOUNDS.minLon) / (BOUNDS.maxLon - BOUNDS.minLon) * (SVG_W - PAD*2),
    PAD + (BOUNDS.maxLat - lat) / (BOUNDS.maxLat - BOUNDS.minLat) * (SVG_H - PAD*2)
  ];
}

// ========== 颜色 ==========
function getColor(b) {
  if (b === '住宅') return '#e74c3c';
  if (['学校','医院'].includes(b)) return '#3498db';
  if (['厂房','写字楼','公寓写字楼'].includes(b)) return '#f39c12';
  if (['文旅','宿舍楼'].includes(b)) return '#27ae60';
  return '#9b59b6';
}

// ========== 河南省轮廓（简化多边形）==========

  [110.55,33.50],[110.90,33.75],[111.55,34.05],[111.95,34.28],
  [112.35,34.45],[112.55,34.75],[112.45,35.15],[112.65,35.45],
  [113.05,35.65],[113.55,35.85],[114.10,35.95],[114.70,36.00],
  [115.10,35.90],[115.55,35.85],[116.00,35.75],[116.30,35.55],
  [116.45,35.15],[116.55,34.75],[116.50,34.35],[116.35,34.00],
  [116.10,33.80],[115.85,33.60],[115.50,33.40],[115.10,33.30],
  [114.60,33.30],[114.10,33.25],[113.60,33.20],[113.05,33.20],
  [112.50,33.20],[112.00,33.20],[111.50,33.25],[111.00,33.35],
  [110.55,33.50]
];

// ========== 城市坐标（用于标注）==========
const CITY_LABELS = [
  {name:'郑州',lon:113.62,lat:34.76},
  {name:'洛阳',lon:112.45,lat:34.62},
  {name:'开封',lon:114.35,lat:34.80},
  {name:'新乡',lon:113.92,lat:35.30},
  {name:'焦作',lon:113.25,lat:35.22},
  {name:'安阳',lon:114.40,lat:36.06},

  {name:'平顶山',lon:113.18,lat:33.77},
  {name:'南阳',lon:112.53,lat:33.00},
  {name:'商丘',lon:115.66,lat:34.42},
  {name:'济源',lon:112.60,lat:35.08},
  {name:'鹤壁',lon:114.30,lat:35.75},
  {name:'濮阳',lon:114.98,lat:35.76},
  {name:'周口',lon:114.65,lat:33.63},
  {name:'漯河',lon:114.02,lat:33.58},
  {name:'三门峡',lon:111.20,lat:34.78},
  {name:'信阳',lon:114.09,lat:32.13},
  {name:'驻马店',lon:114.02,lat:33.02},
];

// ========== 黄河（示意）==========
const YELLOW_RIVER = [
  [110.70,35.65],[111.10,35.50],[111.50,35.30],[111.80,35.15],
  [112.20,35.05],[112.55,35.00],[112.90,34.95],[113.30,34.85],
  [113.70,34.75],[114.10,34.80],[114.50,34.90],[114.90,35.05]
];

let visibleProjects = [];
let activeId = null;

// ========== 渲染地图 ==========
function renderMap() {
  const svg = document.getElementById('mapSvg');
  
  // 构建SVG内容
  let html = '';
  
  // 背景
  html += `<rect width="${SVG_W}" height="${SVG_H}" fill="#e8f4fd"/>`;
  
  // 网格
  for(let i=0;i<=10;i++){
    const x = PAD + i*(SVG_W-PAD*2)/10;
    const y = PAD + i*(SVG_H-PAD*2)/10;
    html += `<line x1="${x}" y1="${PAD}" x2="${x}" y2="${SVG_H-PAD}" stroke="#d0e8f0" stroke-width="0.5"/>`;
    html += `<line x1="${PAD}" y1="${y}" x2="${SVG_W-PAD}" y2="${y}" stroke="#d0e8f0" stroke-width="0.5"/>`;
  }
  
  // 黄河
  if(YELLOW_RIVER.length>1){
    const riverPts = YELLOW_RIVER.map(([lon,lat])=>proj(lon,lat));
    const riverPath = riverPts.map(([x,y],i)=>i===0?`M${x},${y}`:`L${x},${y}`).join(' ');
    html += `<path d="${riverPath}" stroke="#93c9e8" stroke-width="2.5" fill="none" opacity="0.7"/>`;
  }
  
  // 河南省轮廓
  const borderPts = HENAN_BORDER.map(([lon,lat])=>proj(lon,lat));
  const borderPath = borderPts.map(([x,y],i)=>i===0?`M${x},${y}`:`L${x},${y}`).join(' ')+' Z';
  html += `<path d="${borderPath}" fill="#c8e6c9" stroke="#81c784" stroke-width="2"/>`;
  
  // 城市标签
  CITY_LABELS.forEach(c => {
    const [x,y] = proj(c.lon, c.lat);
    if(x>PAD+10 && x<SVG_W-PAD-10 && y>PAD+10 && y<SVG_H-PAD-10){
      html += `<text class="city-label" x="${x}" y="${y}" text-anchor="middle" font-size="11" fill="#666">${c.name}</text>`;
    }
  });
  
  // 项目标记
  visibleProjects.forEach((p, idx) => {
    if(!p.lat || !p.lon) return;
    const [x,y] = proj(p.lon, p.lat);
    const color = getColor(p.business);
    const isActive = p.seq === activeId;
    const r = isActive ? 11 : 9;
    
    html += `<g class="marker-group" onclick="showDetail(${p.seq})" filter="url(#shadow)">`;
    html += `<circle class="marker-circle" cx="${x}" cy="${y}" r="${r}" fill="${color}" stroke="${isActive?'#ffd54f':'white'}" stroke-width="${isActive?3:2}"/>`;
    html += `<text class="marker-label" x="${x}" y="${y}">${idx+1}</text>`;
    html += `</g>`;
  });
  
  svg.innerHTML = html;
}

// ========== 详情面板 ==========
function showDetail(seq) {
  const p = projects.find(x => x.seq === seq);
  if(!p) return;
  activeId = seq;
  renderMap();
  
  const fA = v => typeof v === 'number' ? v.toFixed(1) : (v === 'N/A' ? '-' : v);
  const fA2 = v => typeof v === 'number' ? v.toFixed(2) : (v === 'N/A' ? '-' : v);
  
  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailCity').textContent = '📍 ' + p.city;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-row highlight">
      <span class="label">合同额</span>
      <span class="value">${fA(p.amount)} 亿元</span>
    </div>
    <div class="detail-row">
      <span class="label">建筑面积</span>
      <span class="value">${fA2(p.area)} 万㎡</span>
    </div>
    <div class="detail-row">
      <span class="label">建设单位</span>
      <span class="value">${p.owner}</span>
    </div>
    <div class="detail-row">
      <span class="label">业态类型</span>
      <span class="value">${p.business}</span>
    </div>
    <div class="detail-row">
      <span class="label">承包方式</span>
      <span class="value">${p.type}</span>
    </div>
    <div class="detail-row">
      <span class="label">当前阶段</span>
      <span class="value">${p.stage}</span>
    </div>
    <div class="detail-row">
      <span class="label">详细地址</span>
      <span class="value" style="font-size:11px;color:#555;">${p.addr}</span>
    </div>
  `;
  document.getElementById('detailPanel').classList.add('open');
  
  // 高亮列表
  document.querySelectorAll('.project-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.seq) === seq);
    if(parseInt(el.dataset.seq) === seq){
      el.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  });
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  renderMap();
}

// ========== 筛选 ==========
function applyFilters() {
  const city = document.getElementById('cityFilter').value;
  const biz = document.getElementById('bizFilter').value;
  const stage = document.getElementById('stageFilter').value;
  
  visibleProjects = projects.filter(p => {
    if(!p.lat) return false;
    if(city !== 'all' && p.city !== city) return false;
    if(biz !== 'all' && p.business !== biz) return false;
    if(stage !== 'all' && p.stage !== stage) return false;
    return true;
  });
  
  document.getElementById('countNum').textContent = visibleProjects.length;
  
  let totalAmount = 0, totalArea = 0;
  visibleProjects.forEach(p => {
    if(typeof p.amount === 'number') totalAmount += p.amount;
    if(typeof p.area === 'number') totalArea += p.area;
  });
  document.getElementById('amountNum').textContent = totalAmount.toFixed(1);
  document.getElementById('areaNum').textContent = totalArea.toFixed(1);
  
  renderProjectList();
  closeDetail();
  renderMap();
}

// ========== 项目列表 ==========
function renderProjectList() {
  const container = document.getElementById('projectListContent');
  container.innerHTML = visibleProjects.map(p => `
    <div class="project-item" data-seq="${p.seq}" onclick="showDetail(${p.seq})">
      <div class="name">
        <span class="dot" style="background:${getColor(p.business)}"></span>
        ${p.name.length>20 ? p.name.slice(0,20)+'...' : p.name}
      </div>
      <div class="meta">
        <span>📍 ${p.city}</span>
        <span>💰 ${typeof p.amount==='number'?p.amount.toFixed(1):p.amount}亿</span>
        <span>🏗️ ${p.business}</span>
      </div>
    </div>
  `).join('');
}

// ========== 初始化 ==========
function init() {
  const cities = [...new Set(projects.map(p=>p.city))].filter(Boolean).sort();
  const bizs = [...new Set(projects.map(p=>p.business))].filter(Boolean).sort();
  const stages = [...new Set(projects.map(p=>p.stage))].filter(Boolean).sort();
  
  cities.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    document.getElementById('cityFilter').appendChild(opt);
  });
  bizs.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b === '/' ? '未分类' : b;
    document.getElementById('bizFilter').appendChild(opt);
  });
  stages.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s === '/' ? '未分类' : s;
    document.getElementById('stageFilter').appendChild(opt);
  });
  
  visibleProjects = [...projects];
  renderProjectList();
  renderMap();
}

init();
</script>
